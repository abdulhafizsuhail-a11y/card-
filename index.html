<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards</title>
    <link
      rel="stylesheet"
      href="  https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="cards">
      <div class="card-box">
        <!-- header -->
        <div class="card-header">
          <img src="images/business.svg" alt="" />
          <h3>STARTER</h3>
        </div>
        <!-- detail -->
        <div class="card-detail">
          <p><i class="fa-solid fa-check-double"></i> Full User</p>
          <p><i class="fa-solid fa-check-double"></i> Contact Per Clients</p>
          <p><i class="fa-solid fa-xmark"></i> Fast Design</p>
          <p><i class="fa-solid fa-xmark"></i> Great accessibility</p>
        </div>
        <!-- price -->
        <div class="card-price">
          <span class="price"> <sup>$</sup>10</span> <sub>/month</sub>
        </div>
        <!-- button -->
        <div class="card-button">
          <button class="button">I Want It</button>
        </div>
      </div>
      <div class="card-box">
        <!-- header -->
        <div class="card-header">
          <img src="images/business1.svg" alt="" />
          <h3>PROFESSIONAL</h3>
        </div>
        <!-- detail -->
        <div class="card-detail">
          <p><i class="fa-solid fa-check-double"></i>5 Full User</p>
          <p><i class="fa-solid fa-check-double"></i>20 Contact Per Clients</p>
          <p><i class="fa-solid fa-check-double"></i> Fast Design</p>
          <p><i class="fa-solid fa-xmark"></i> Great accessibility</p>
        </div>
        <!-- price -->
        <div class="card-price">
          <span class="price"><sup>$</sup>25</span> <sub>/month</sub>
        </div>
        <!-- button -->
        <div class="card-button">
          <button class="button">I Want It</button>
        </div>
      </div>
      <div class="card-box">
        <!-- header -->
        <div class="card-header">
          <img src="images/business2.svg" alt="" />
          <h3>BUSINESS</h3>
        </div>
        <!-- detail -->
        <div class="card-detail">
          <p><i class="fa-solid fa-check-double"></i> Full User</p>
          <p><i class="fa-solid fa-check-double"></i> Contact Per Clients</p>
          <p><i class="fa-solid fa-check-double"></i> Fast Design</p>
          <p><i class="fa-solid fa-check-double"></i> Great accessibility</p>
        </div>
        <!-- price -->
        <div class="card-price">
          <span class="price"> <sup>$</sup>45</span> <sub>/month</sub>
        </div>
        <!-- button -->
        <div class="card-button">
          <button class="button">I Want It</button>
        </div>
      </div>
    </section>
  </body>
</html>
